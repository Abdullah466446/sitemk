<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lise Nexus | Kampüs Bağlantısı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-dark: #09090b;
            --glass: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fafafa;
            overflow: hidden;
            touch-action: none;
        }
        .glass-effect {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }
        .swipe-card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 32px;
            cursor: grab;
            transition: transform 0.15s ease-out, opacity 0.2s;
            user-select: none;
            touch-action: none;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
        }
        .nav-item.active { color: var(--primary); transform: scale(1.2); }
        
        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .view-transition { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="app" class="relative h-screen w-full flex flex-col overflow-hidden max-w-md mx-auto bg-zinc-950 border-x border-zinc-900">
        <!-- Loading Overlay -->
        <div id="loading-screen" class="absolute inset-0 z-[300] bg-zinc-950 flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p class="text-zinc-500 font-bold tracking-widest text-[10px] uppercase">Nexus Sync...</p>
        </div>

        <!-- Header -->
        <header id="app-header" class="hidden flex justify-between items-center px-6 py-5 z-50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="zap" class="w-5 h-5 text-white fill-current"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter italic">LISE<span class="text-indigo-500">.</span>NEXUS</h1>
            </div>
            <button onclick="App.navigate('profile')" class="w-10 h-10 rounded-full border border-zinc-800 p-0.5 overflow-hidden">
                <img id="header-avatar" src="https://placehold.co/100x100/18181b/ffffff?text=U" class="w-full h-full rounded-full object-cover">
            </button>
        </header>

        <!-- Main Content -->
        <main id="viewport" class="flex-1 relative flex items-center justify-center p-4 overflow-hidden">
            <!-- Content Injected via JS -->
        </main>

        <!-- Navigation -->
        <nav id="app-nav" class="hidden glass-effect mx-6 mb-6 px-8 py-4 rounded-3xl flex justify-between items-center z-50">
            <button onclick="App.navigate('discover')" class="nav-item active" data-nav="discover"><i data-lucide="layout-grid"></i></button>
            <button onclick="App.navigate('chat')" class="nav-item" data-nav="chat"><i data-lucide="message-square"></i></button>
            <button onclick="App.navigate('events')" class="nav-item" data-nav="events"><i data-lucide="star"></i></button>
            <button onclick="App.navigate('settings')" class="nav-item" data-nav="settings"><i data-lucide="user"></i></button>
        </nav>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[400] glass-effect px-5 py-3 rounded-2xl opacity-0 transition-all pointer-events-none text-xs font-bold text-white shadow-2xl border-indigo-500/20">
            <span id="toast-text"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = 'nexus_v10_final'; // Unique ID for sandbox consistency
        
        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);
        const auth = getAuth(fbApp);

        const App = {
            state: {
                user: null,
                allUsers: [],
                currentView: 'loading',
                isSyncing: false,
                selectedAvatar: null,
                isGeneratingAI: false
            },

            async compressImage(base64Str, maxWidth = 400, quality = 0.7) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxWidth) {
                                width *= maxWidth / height;
                                height = maxWidth;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        // Görseli JPEG formatında ve belirlenen kalitede sıkıştırarak çıktı al
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                });
            },

            async init() {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        try {
                            // Try to fetch profile from the most reliable sandbox path
                            const userRef = doc(db, 'artifacts', appId, 'users', user.uid);
                            const userSnap = await getDoc(userRef);

                            if (userSnap.exists()) {
                                this.state.user = { id: user.uid, ...userSnap.data() };
                                this.updateHeaderUI();
                                this.showApp();
                                this.navigate('discover');
                                this.startRealtimeSync();
                            } else {
                                // Profile doesn't exist, show onboarding
                                this.hideLoading();
                                this.renderOnboarding();
                            }
                        } catch (err) {
                            // KRİTİK: Yetki hatası alınırsa bu genellikle belgenin henüz olmamasındandır.
                            // Çökme yerine kayıt ekranına zorla yönlendiriyoruz.
                            console.warn("Profil erişimi kısıtlı veya yok, kayıt ekranına yönlendiriliyor...");
                            this.hideLoading();
                            this.renderOnboarding();
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            },

            async generateAIAvatar() {
                const prompt = document.getElementById('ai-prompt').value.trim();
                if (!prompt) return this.showToast("Lütfen bir tarz belirt!");

                this.state.isGeneratingAI = true;
                this.renderOnboarding();

                try {
                    const apiKey = ""; // API Key will be automatically injected by the environment
                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            instances: [{ prompt: `High quality character portrait of a high school student, ${prompt}, vibrant colors, smooth digital art style.` }], 
                            parameters: { "sampleCount": 1 } 
                        })
                    });

                    const result = await response.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        const rawAvatar = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                        this.state.selectedAvatar = await this.compressImage(rawAvatar);
                        this.showToast("Karakter oluşturuldu ve optimize edildi!");
                    } else {
                        throw new Error("Görsel üretilemedi.");
                    }
                } catch (e) {
                    this.showToast("AI Üretim Hatası (Kota veya Yetki)");
                    console.error(e);
                } finally {
                    this.state.isGeneratingAI = false;
                    this.renderOnboarding();
                }
            },

            renderOnboarding() {
                const viewport = document.getElementById('viewport');
                const avatar = this.state.selectedAvatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=Nexus`;
                
                viewport.innerHTML = `
                    <div class="view-transition flex flex-col items-center p-6 w-full max-h-full overflow-y-auto">
                        <div class="relative mb-6">
                            <div class="w-32 h-32 rounded-[2.5rem] bg-zinc-900 border-4 border-indigo-500/20 overflow-hidden relative">
                                ${this.state.isGeneratingAI ? `<div class="absolute inset-0 bg-black/70 flex items-center justify-center z-10"><div class="loader"></div></div>` : ''}
                                <img src="${avatar}" class="w-full h-full object-cover">
                            </div>
                            <label class="absolute -bottom-2 -right-2 w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:bg-indigo-500 transition-colors">
                                <i data-lucide="camera" class="w-5 h-5 text-white"></i>
                                <input type="file" class="hidden" accept="image/*" onchange="App.handleFileUpload(event)">
                            </label>
                        </div>

                        <div class="w-full space-y-4">
                            <div class="flex gap-2">
                                <input type="text" id="reg-name" placeholder="İsim Soyisim" class="flex-1 py-4 px-5 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none focus:border-indigo-500 transition-all text-sm">
                                <select id="reg-grade" class="w-24 py-4 px-2 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm">
                                    <option value="9">9. Sınıf</option><option value="10">10. Sınıf</option><option value="11">11. Sınıf</option><option value="12">12. Sınıf</option>
                                </select>
                            </div>

                            <div class="bg-indigo-600/5 p-4 rounded-2xl border border-indigo-500/10">
                                <p class="text-[10px] font-black text-indigo-400 uppercase mb-3 flex items-center gap-2"><i data-lucide="sparkles" class="w-3 h-3"></i> AI Avatar Oluştur</p>
                                <div class="flex gap-2">
                                    <input type="text" id="ai-prompt" placeholder="Mavi saçlı, basketbolcu..." class="flex-1 bg-black/40 border border-white/5 rounded-xl px-4 py-2 text-xs outline-none focus:border-indigo-500">
                                    <button onclick="App.generateAIAvatar()" class="px-4 py-2 bg-indigo-600 text-white rounded-xl transition-all active:scale-90">
                                        <i data-lucide="wand-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>

                            <textarea id="reg-bio" placeholder="Bize kendinden bahset (Hangi kulüptesin? Hangi dersleri seviyorsun?)" class="w-full py-4 px-5 rounded-2xl bg-zinc-900 border border-zinc-800 h-24 resize-none text-sm"></textarea>
                            
                            <button onclick="App.registerUser()" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl active:scale-95 transition-transform shadow-xl uppercase tracking-[0.2em] text-xs">Kaydı Tamamla</button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            },

            async registerUser() {
                const name = document.getElementById('reg-name').value.trim();
                const grade = document.getElementById('reg-grade').value;
                const bio = document.getElementById('reg-bio').value.trim();
                const avatar = this.state.selectedAvatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${name || Date.now()}`;

                if (!name) return this.showToast("Lütfen ismini yaz!");

                try {
                    const uid = auth.currentUser.uid;
                    const userData = {
                        name, grade, bio, avatar,
                        createdAt: new Date().toISOString(),
                        lastActive: serverTimestamp()
                    };

                    // Save to the strictly permitted path
                    await setDoc(doc(db, 'artifacts', appId, 'users', uid), userData);
                    
                    this.state.user = { id: uid, ...userData };
                    this.updateHeaderUI();
                    this.showApp();
                    this.navigate('discover');
                    this.startRealtimeSync();
                    this.showToast("Hoş geldin!");
                } catch (e) {
                    console.error(e);
                    this.showToast("Kayıt hatası: Yetki engeli.");
                }
            },

            startRealtimeSync() {
                if (this.state.isSyncing) return;
                this.state.isSyncing = true;

                try {
                    const usersCol = collection(db, 'artifacts', appId, 'users');
                    onSnapshot(usersCol, (snapshot) => {
                        this.state.allUsers = snapshot.docs
                            .map(doc => ({ id: doc.id, ...doc.data() }))
                            .filter(u => u.id !== auth.currentUser?.uid);
                        
                        if (this.state.currentView === 'discover') this.renderDiscover();
                    }, (err) => {
                        console.warn("Sync Permission Issue:", err);
                        this.showToast("Diğer kullanıcılar yüklenemedi (Sadece sen varsın).");
                    });
                } catch (e) { console.error(e); }
            },

            renderDiscover() {
                const viewport = document.getElementById('viewport');
                if (this.state.allUsers.length === 0) {
                    viewport.innerHTML = `<div class="view-transition text-center opacity-40"><i data-lucide="users" class="w-12 h-12 mx-auto mb-4"></i><p class="text-sm font-medium">Şu an kimse online değil...</p></div>`;
                    lucide.createIcons();
                    return;
                }

                viewport.innerHTML = `<div id="card-container" class="relative w-full max-w-[340px] h-[540px]"></div>`;
                const container = document.getElementById('card-container');

                this.state.allUsers.slice(0, 3).reverse().forEach((u, idx) => {
                    const card = document.createElement('div');
                    card.className = 'swipe-card glass-effect';
                    card.style.zIndex = idx;
                    card.innerHTML = `
                        <img src="${u.avatar}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 gradient-overlay"></div>
                        <div class="absolute bottom-0 left-0 right-0 p-8">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-indigo-600 text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-wider">${u.grade}. SINIF</span>
                            </div>
                            <h3 class="text-2xl font-black italic tracking-tighter">${u.name}</h3>
                            <p class="text-zinc-300 text-sm mt-2 line-clamp-2">${u.bio || 'Henüz bir bio eklemedi.'}</p>
                        </div>
                    `;
                    if (idx === Math.min(this.state.allUsers.length, 3) - 1) this.attachSwipeEvents(card, u);
                    container.appendChild(card);
                });
            },

            attachSwipeEvents(card, targetUser) {
                let startX = 0, currentX = 0, isDragging = false;
                const onStart = (e) => {
                    isDragging = true;
                    startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    card.style.transition = 'none';
                };
                const onMove = (e) => {
                    if (!isDragging) return;
                    currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const deltaX = currentX - startX;
                    const rotation = deltaX * 0.1;
                    card.style.transform = `translateX(${deltaX}px) rotate(${rotation}deg)`;
                    card.style.opacity = 1 - Math.abs(deltaX) / 1000;
                };
                const onEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    const deltaX = currentX - startX;
                    if (Math.abs(deltaX) > 120) {
                        card.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        card.style.transform = `translateX(${deltaX > 0 ? 1000 : -1000}px) rotate(${deltaX * 0.1}deg)`;
                        setTimeout(() => {
                            this.state.allUsers = this.state.allUsers.filter(u => u.id !== targetUser.id);
                            this.renderDiscover();
                        }, 200);
                        if (deltaX > 0) this.showToast(`${targetUser.name} beğenildi!`);
                    } else {
                        card.style.transition = '0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                        card.style.transform = '';
                        card.style.opacity = '1';
                    }
                };
                card.addEventListener('mousedown', onStart);
                card.addEventListener('touchstart', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('touchmove', onMove);
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchend', onEnd);
            },

            navigate(view) {
                this.state.currentView = view;
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.nav === view));
                if (view === 'discover') this.renderDiscover();
                else {
                    document.getElementById('viewport').innerHTML = `
                        <div class="view-transition text-center p-8">
                            <h2 class="text-xl font-bold mb-2">${view.toUpperCase()}</h2>
                            <p class="text-zinc-500 text-sm">Bu özellik bir sonraki güncellemede gelecek!</p>
                        </div>
                    `;
                }
                lucide.createIcons();
            },

            handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                // Dosya boyutu kontrolü (Opsiyonel ön kontrol)
                const reader = new FileReader();
                reader.onload = async (event) => {
                    this.state.selectedAvatar = await this.compressImage(event.target.result);
                    this.renderOnboarding();
                };
                reader.readAsDataURL(file);
            },

            updateHeaderUI() {
                if (this.state.user) {
                    document.getElementById('header-avatar').src = this.state.user.avatar;
                }
            },

            showApp() {
                this.hideLoading();
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('app-nav').classList.remove('hidden');
            },

            hideLoading() { document.getElementById('loading-screen').classList.add('hidden'); },

            showToast(msg) {
                const t = document.getElementById('toast');
                document.getElementById('toast-text').innerText = msg;
                t.style.opacity = '1';
                setTimeout(() => t.style.opacity = '0', 2500);
            }
        };

        window.App = App;
        window.onload = () => App.init();
    </script>
</body>
</html>
