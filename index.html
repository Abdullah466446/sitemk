<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lise Nexus | Kampüs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #6366f1; --bg-dark: #09090b; --glass: rgba(24, 24, 27, 0.7); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #fafafa; overflow: hidden; touch-action: none; }
        .glass-effect { background: var(--glass); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); }
        .swipe-card { position: absolute; width: 100%; height: 100%; border-radius: 32px; cursor: grab; transition: transform 0.15s ease-out, opacity 0.2s; user-select: none; touch-action: none; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .gradient-overlay { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 40%, transparent 100%); }
        .nav-item.active { color: var(--primary); transform: scale(1.1); }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #71717a; }
        .loader { width: 28px; height: 28px; border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .view-transition { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="app" class="relative h-[100dvh] w-full flex flex-col overflow-hidden max-w-md mx-auto bg-zinc-950 border-x border-zinc-900 shadow-2xl">
        
        <div id="loading-screen" class="absolute inset-0 z-[300] bg-zinc-950 flex flex-col items-center justify-center">
            <div class="loader mb-6"></div>
            <p class="text-zinc-500 font-bold tracking-[0.3em] text-[10px] uppercase animate-pulse">NEXUS SYNC</p>
        </div>

        <header id="app-header" class="hidden flex justify-between items-center px-6 pt-8 pb-4 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i data-lucide="sparkles" class="w-6 h-6 text-white fill-current"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tighter leading-none">NEXUS<span class="text-indigo-500">.</span></h1>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Kampüs Canlı</p>
                </div>
            </div>
            <button onclick="App.navigate('settings')" class="w-11 h-11 rounded-2xl border border-zinc-800 p-0.5 overflow-hidden transition-transform active:scale-90">
                <img id="header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" class="w-full h-full rounded-[14px] object-cover bg-zinc-900">
            </button>
        </header>

        <main id="viewport" class="flex-1 relative flex items-center justify-center p-6 overflow-hidden"></main>

        <nav id="app-nav" class="hidden glass-effect mx-6 mb-8 px-2 py-2 rounded-[2.5rem] flex justify-around items-center z-50 shadow-2xl">
            <button onclick="App.navigate('discover')" class="nav-item active w-14 h-14 flex items-center justify-center rounded-full" data-nav="discover"><i data-lucide="gallery-horizontal"></i></button>
            <button onclick="App.navigate('chat')" class="nav-item w-14 h-14 flex items-center justify-center rounded-full" data-nav="chat"><i data-lucide="message-circle"></i></button>
            <button onclick="App.navigate('events')" class="nav-item w-14 h-14 flex items-center justify-center rounded-full" data-nav="events"><i data-lucide="compass"></i></button>
            <button onclick="App.navigate('settings')" class="nav-item w-14 h-14 flex items-center justify-center rounded-full" data-nav="settings"><i data-lucide="user-cog"></i></button>
        </nav>

        <div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 z-[400] glass-effect px-6 py-3.5 rounded-2xl opacity-0 translate-y-4 transition-all pointer-events-none text-[11px] font-bold text-white shadow-2xl flex items-center gap-3">
            <div id="toast-icon" class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
            <span id="toast-text"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMZt-_dLBWnN6NDK6M0NdRMGcakUFLj44",
            authDomain: "okul-a5799.firebaseapp.com",
            projectId: "okul-a5799",
            storageBucket: "okul-a5799.firebasestorage.app",
            messagingSenderId: "7054354141",
            appId: "1:7054354141:web:4abc592c0e1aa39869dd34",
            measurementId: "G-662ZTGDQVE"
        };

        const appId = 'nexus_prod_v1';
        let fbApp, db, auth;

        const App = {
            state: { user: null, allUsers: [], currentView: 'loading', selectedAvatar: null, isRegistering: false },

            async compressImage(base64Str, maxWidth = 400) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; } }
                        else { if (h > maxWidth) { w *= maxWidth / h; h = maxWidth; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                });
            },

            async init() {
                try {
                    fbApp = initializeApp(firebaseConfig);
                    db = getFirestore(fbApp);
                    auth = getAuth(fbApp);

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            await this.checkUserProfile(user);
                        } else {
                            await signInAnonymously(auth);
                        }
                    });
                } catch (e) {
                    this.showToast("Firebase Bağlantı Hatası!");
                    this.hideLoading();
                }
            },

            async checkUserProfile(user) {
                try {
                    // SANDBOX/GITHUB UYUMLU YOL: artifacts/{appId}/public/data/users/{uid}
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                    const snap = await getDoc(userRef);
                    if (snap.exists()) {
                        this.state.user = { id: user.uid, ...snap.data() };
                        this.showApp();
                        this.navigate('discover');
                        this.startSync();
                    } else {
                        this.renderOnboarding();
                    }
                } catch (e) {
                    console.error("Profile Error:", e);
                    this.renderOnboarding();
                } finally {
                    this.hideLoading();
                }
            },

            renderOnboarding() {
                const vp = document.getElementById('viewport');
                const avatar = this.state.selectedAvatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=User${Math.random()}`;
                vp.innerHTML = `
                    <div class="view-transition flex flex-col items-center w-full px-2 max-h-full overflow-y-auto">
                        <h2 class="text-2xl font-black mb-8 italic">HOŞ GELDİN</h2>
                        <div class="relative mb-10">
                            <div class="w-32 h-32 rounded-[2.5rem] bg-zinc-900 border-4 border-indigo-500/20 overflow-hidden shadow-2xl">
                                <img src="${avatar}" id="preview-img" class="w-full h-full object-cover">
                            </div>
                            <label class="absolute -bottom-2 -right-2 w-12 h-12 bg-white text-black rounded-full flex items-center justify-center cursor-pointer shadow-xl">
                                <i data-lucide="camera" class="w-6 h-6"></i>
                                <input type="file" class="hidden" accept="image/*" onchange="App.handleFileUpload(event)">
                            </label>
                        </div>
                        <div class="w-full space-y-4 mb-10">
                            <div class="flex gap-2">
                                <input id="reg-name" type="text" placeholder="Adın Soyadın" class="flex-1 bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-indigo-500 text-sm">
                                <select id="reg-grade" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-xs font-bold">
                                    <option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                            </div>
                            <textarea id="reg-bio" placeholder="Bio: Hangi kulüptesin?" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl h-24 outline-none focus:border-indigo-500 text-sm resize-none"></textarea>
                            <button id="reg-btn" onclick="App.registerUser()" class="w-full py-5 bg-indigo-600 text-white font-black rounded-3xl uppercase tracking-widest text-[11px] shadow-xl shadow-indigo-600/20 flex items-center justify-center gap-2">
                                <span id="btn-text">NEXUS'U BAŞLAT</span>
                                <div id="btn-loader" class="loader !w-4 !h-4 !border-2 hidden"></div>
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            },

            async registerUser() {
                if (this.state.isRegistering) return;
                const name = document.getElementById('reg-name').value.trim();
                const grade = document.getElementById('reg-grade').value;
                const bio = document.getElementById('reg-bio').value.trim();

                if (name.length < 3) return this.showToast("İsim çok kısa!");
                
                this.setRegLoading(true);
                const avatar = this.state.selectedAvatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
                
                try {
                    const uid = auth.currentUser.uid;
                    const data = { name, grade, bio, avatar, role: 'user', createdAt: new Date().toISOString() };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), data);
                    
                    this.state.user = { id: uid, ...data };
                    this.showApp();
                    this.navigate('discover');
                    this.startSync();
                } catch (e) {
                    console.error("Reg Error:", e);
                    this.showToast("Hata: Firestore İzni Yok! (Rules kontrol et)");
                } finally {
                    this.setRegLoading(false);
                }
            },

            setRegLoading(isLoading) {
                this.state.isRegistering = isLoading;
                const btn = document.getElementById('reg-btn');
                const text = document.getElementById('btn-text');
                const loader = document.getElementById('btn-loader');
                if (btn) {
                    btn.disabled = isLoading;
                    text.classList.toggle('hidden', isLoading);
                    loader.classList.toggle('hidden', !isLoading);
                }
            },

            startSync() {
                if (this.state.isSyncing) return;
                this.state.isSyncing = true;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                onSnapshot(q, (snap) => {
                    this.state.allUsers = snap.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .filter(u => u.id !== auth.currentUser.uid);
                    if (this.state.currentView === 'discover') this.renderDiscover();
                }, (err) => console.warn("Sync Permission Denied"));
            },

            renderDiscover() {
                const vp = document.getElementById('viewport');
                if (this.state.allUsers.length === 0) {
                    vp.innerHTML = `<div class="opacity-30 text-center text-[10px] font-bold uppercase tracking-widest">Çevrende kimse yok...</div>`;
                    return;
                }
                vp.innerHTML = `<div id="card-container" class="relative w-full aspect-[3/4.5] max-w-[320px]"></div>`;
                const container = document.getElementById('card-container');
                this.state.allUsers.slice(0, 3).reverse().forEach((u, i) => {
                    const card = document.createElement('div');
                    card.className = 'swipe-card glass-effect';
                    card.style.zIndex = i;
                    card.innerHTML = `
                        <img src="${u.avatar}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 gradient-overlay"></div>
                        <div class="absolute bottom-0 left-0 right-0 p-8">
                            <span class="bg-indigo-600 px-2 py-1 rounded text-[8px] font-black uppercase mb-2 inline-block">${u.grade}. SINIF</span>
                            <h3 class="text-xl font-bold italic">${u.name}</h3>
                            <p class="text-zinc-400 text-[10px] mt-1 line-clamp-2">${u.bio || 'Merhaba!'}</p>
                        </div>
                    `;
                    if (i === Math.min(this.state.allUsers.length, 3) - 1) this.attachSwipe(card, u);
                    container.appendChild(card);
                });
            },

            attachSwipe(card, user) {
                let sX = 0, cX = 0, drag = false;
                const move = (e) => {
                    if (!drag) return;
                    cX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const dX = cX - sX;
                    card.style.transform = `translateX(${dX}px) rotate(${dX * 0.05}deg)`;
                };
                const end = () => {
                    if (!drag) return;
                    drag = false;
                    const dX = cX - sX;
                    if (Math.abs(dX) > 100) {
                        card.style.transform = `translateX(${dX > 0 ? 600 : -600}px) rotate(${dX * 0.1}deg)`;
                        card.style.opacity = '0';
                        setTimeout(() => {
                            this.state.allUsers = this.state.allUsers.filter(it => it.id !== user.id);
                            this.renderDiscover();
                        }, 200);
                        this.showToast(dX > 0 ? "Beğendin!" : "Geçtin.");
                    } else {
                        card.style.transform = '';
                    }
                };
                card.addEventListener('mousedown', (e) => { drag = true; sX = e.clientX; card.style.transition = 'none'; });
                card.addEventListener('touchstart', (e) => { drag = true; sX = e.touches[0].clientX; card.style.transition = 'none'; });
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move);
                window.addEventListener('mouseup', end);
                window.addEventListener('touchend', end);
            },

            navigate(view) {
                this.state.currentView = view;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.nav === view));
                if (view === 'discover') this.renderDiscover();
                else if (view === 'settings') this.renderSettings();
                else document.getElementById('viewport').innerHTML = `<div class="opacity-20 text-[10px] font-bold uppercase">${view} yakında...</div>`;
                lucide.createIcons();
            },

            renderSettings() {
                const u = this.state.user;
                document.getElementById('viewport').innerHTML = `
                    <div class="view-transition w-full text-center px-4">
                        <div class="w-24 h-24 rounded-3xl bg-zinc-900 mx-auto mb-4 border-2 border-indigo-500/30 overflow-hidden">
                            <img src="${u.avatar}" class="w-full h-full object-cover">
                        </div>
                        <h2 class="font-bold">${u.name}</h2>
                        <p class="text-[10px] text-zinc-500 uppercase font-black mt-1">${u.grade}. Sınıf</p>
                        <button onclick="location.reload()" class="mt-10 w-full py-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl text-[10px] font-black uppercase">Çıkış Yap</button>
                    </div>
                `;
            },

            handleFileUpload(e) {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader();
                r.onload = async (ev) => {
                    this.state.selectedAvatar = await this.compressImage(ev.target.result);
                    const img = document.getElementById('preview-img');
                    if(img) img.src = this.state.selectedAvatar;
                };
                r.readAsDataURL(f);
            },

            showApp() {
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('app-nav').classList.remove('hidden');
                document.getElementById('header-avatar').src = this.state.user.avatar;
            },
            hideLoading() { document.getElementById('loading-screen').classList.add('hidden'); },
            showToast(m) {
                const t = document.getElementById('toast');
                document.getElementById('toast-text').innerText = m;
                t.style.opacity = '1'; t.style.transform = 'translate(-50%, -10px)';
                setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 10px)'; }, 2500);
            }
        };

        window.App = App;
        window.onload = () => App.init();
    </script>
</body>
</html>
